services:
  - type: web
    name: ghostmonitor-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/auth/check
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: SESSION_SECRET
        generateValue: true

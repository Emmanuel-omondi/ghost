<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Admin Panel — GhostMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.04);
            --accent: #7c5cfc; --accent-dark: #6b4ce6; --accent-glow: rgba(124,92,252,0.3); --accent-soft: rgba(124,92,252,0.1);
            --text: #f0eeff; --text2: #b8b4d0; --muted: #5a5670;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #06b6d4;
            --danger-soft: rgba(255,77,109,0.1);
        }
        html, body { width:100%; height:100%; overflow-x:hidden; }
        body {
            font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text);
            min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:radial-gradient(ellipse 55% 45% at 80% 5%, rgba(124,92,252,0.07) 0%, transparent 60%);
            pointer-events:none; z-index:0;
        }

        /* Topbar */
        .topbar {
            position:sticky; top:0; z-index:100;
            background:var(--surface); border-bottom:1px solid var(--border);
        }
        .topbar-inner {
            display:flex; align-items:center; justify-content:space-between;
            gap:1rem; padding:0 1.5rem; height:60px;
        }
        .brand { display:flex; align-items:center; gap:0.65rem; flex-shrink:0; }
        .brand-icon {
            width:36px; height:36px; background:var(--accent); border-radius:10px;
            display:flex; align-items:center; justify-content:center; font-size:1rem;
            box-shadow:0 0 18px var(--accent-glow);
        }
        .brand-name { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; letter-spacing:-0.02em; white-space:nowrap; }
        .badge-admin {
            display:inline-block; background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.22);
            color:#ff8099; font-size:0.6rem; font-weight:700; letter-spacing:0.09em; text-transform:uppercase;
            padding:0.17rem 0.42rem; border-radius:4px; margin-left:0.35rem; vertical-align:middle;
        }
        .topbar-nav { display:flex; align-items:center; gap:0.3rem; flex-shrink:0; }
        .topbar-nav a {
            display:inline-flex; align-items:center; gap:0.4rem; padding:0.5rem 1rem;
            border-radius:9px; font-size:0.875rem; font-weight:500; text-decoration:none;
            color:var(--text2); border:1px solid transparent; white-space:nowrap;
            transition:background 0.2s,color 0.2s,border-color 0.2s;
        }
        .topbar-nav a:hover { background:var(--accent-soft); color:var(--text); border-color:rgba(124,92,252,0.2); }
        .topbar-nav a.active { background:var(--accent-soft); color:var(--accent); border-color:rgba(124,92,252,0.25); }
        .topbar-nav a.logout { color:#ff8099; border-color:rgba(255,77,109,0.2); }
        .topbar-nav a.logout:hover { background:rgba(255,77,109,0.1); border-color:rgba(255,77,109,0.35); }

        /* Content */
        .content {
            position:relative; z-index:1; flex:1;
            padding:1.75rem 1.5rem; max-width:1000px; margin:0 auto; width:100%;
        }

        /* Welcome */
        .welcome {
            background:var(--surface); border:1px solid var(--border); border-radius:18px;
            padding:1.5rem 1.75rem; display:flex; align-items:center; gap:1.1rem; margin-bottom:1.75rem;
        }
        .welcome-icon {
            width:50px; height:50px; background:var(--accent-soft); border-radius:14px;
            display:flex; align-items:center; justify-content:center; font-size:1.35rem; color:var(--accent); flex-shrink:0;
        }
        .welcome h2 { font-family:'Syne',sans-serif; font-size:1.25rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:0.2rem; }
        .welcome p { font-size:0.85rem; color:var(--text2); }

        /* Stats grid */
        .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.75rem; }
        .stat-card {
            background:var(--surface); border:1px solid var(--border); border-radius:16px;
            padding:1.25rem; text-align:center; transition:border-color 0.2s,box-shadow 0.2s;
        }
        .stat-card:hover { border-color:rgba(124,92,252,0.3); box-shadow:0 0 24px var(--accent-glow); }
        .stat-val { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:700; color:var(--accent); margin-bottom:0.35rem; }
        .stat-lbl { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }

        /* Tabs */
        .tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:0.25rem; }
        .tab-btn {
            padding:0.65rem 1.25rem; background:var(--surface); border:1px solid var(--border);
            border-radius:10px; color:var(--text2); cursor:pointer; font-size:0.875rem; font-weight:500;
            white-space:nowrap; transition:all 0.2s; font-family:'DM Sans',sans-serif;
        }
        .tab-btn:hover { border-color:var(--accent); color:var(--text); }
        .tab-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }

        /* Card */
        .card {
            background:var(--surface); border:1px solid var(--border); border-radius:16px;
            padding:1.5rem; margin-bottom:1.5rem; animation:fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; }
        .card-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; display:flex; align-items:center; gap:0.6rem; }
        .card-title i { color:var(--accent); }
        .hidden { display:none !important; }

        /* Table */
        .tbl-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; }
        th { background:var(--surface2); padding:0.875rem 1rem; text-align:left; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid var(--border); }
        td { padding:0.875rem 1rem; border-bottom:1px solid var(--border); font-size:0.875rem; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:var(--surface2); }

        /* Badge */
        .badge { display:inline-block; padding:0.3rem 0.65rem; border-radius:6px; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
        .badge-success { background:rgba(16,185,129,0.15); color:var(--success); }
        .badge-warning { background:rgba(245,158,11,0.15); color:var(--warning); }
        .badge-danger  { background:rgba(239,68,68,0.15);  color:var(--danger); }
        .badge-info    { background:rgba(6,182,212,0.15);   color:var(--info); }

        /* Buttons */
        .btn { padding:0.6rem 1.25rem; border:none; border-radius:9px; font-weight:600; cursor:pointer; font-size:0.85rem; display:inline-flex; align-items:center; gap:0.4rem; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:var(--accent-dark); transform:translateY(-1px); box-shadow:0 6px 18px var(--accent-glow); }
        .btn-danger { background:rgba(239,68,68,0.1); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
        .btn-danger:hover { background:rgba(239,68,68,0.2); }

        /* Loading */
        .loading { display:flex; align-items:center; justify-content:center; padding:2.5rem; color:var(--muted); gap:0.75rem; }
        .spinner { width:22px; height:22px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* Empty */
        .empty { text-align:center; padding:3rem 1.5rem; color:var(--muted); }
        .empty i { font-size:2.5rem; margin-bottom:1rem; opacity:0.4; display:block; }

        /* Responsive */
        @media(max-width:768px) {
            .topbar-inner { padding:0 1rem; }
            .content { padding:1.25rem 1rem; }
            .stats-grid { grid-template-columns:repeat(2,1fr); }
        }
        @media(max-width:540px) {
            .topbar-inner { height:auto; flex-direction:column; align-items:stretch; padding:0.85rem 1rem 0; gap:0; }
            .brand { padding-bottom:0.85rem; }
            .topbar-nav { width:100%; padding:0.5rem 0 0.65rem; gap:0.35rem; border-top:1px solid var(--border2); }
            .topbar-nav a { flex:1; justify-content:center; padding:0.55rem 0.4rem; font-size:0.82rem; background:var(--surface2); border-color:var(--border2); }
            .stats-grid { grid-template-columns:1fr 1fr; }
            .welcome { padding:1.1rem; gap:0.85rem; }
        }
        @media(max-width:400px) { .stats-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-ghost"></i></div>
                <span class="brand-name">GhostMonitor <span class="badge-admin">Admin</span></span>
            </div>
            <nav class="topbar-nav">
                <a href="#" class="active" data-tab="overview"><i class="fas fa-chart-line"></i> <span>Overview</span></a>
                <a href="#" data-tab="users"><i class="fas fa-users"></i> <span>Users</span></a>
                <a href="#" data-tab="devices"><i class="fas fa-mobile-alt"></i> <span>Devices</span></a>
                <a href="#" data-tab="logs"><i class="fas fa-list"></i> <span>Logs</span></a>
                <a href="#" class="logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>
            </nav>
        </div>
    </div>

    <div class="content">
        <div class="welcome">
            <div class="welcome-icon"><i class="fas fa-shield-alt"></i></div>
            <div>
                <h2>Admin Panel</h2>
                <p>Manage users, licenses, devices and system settings.</p>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-val" id="statUsers">—</div><div class="stat-lbl">Total Users</div></div>
            <div class="stat-card"><div class="stat-val" id="statDevices">—</div><div class="stat-lbl">Devices</div></div>
            <div class="stat-card"><div class="stat-val" id="statPackets">—</div><div class="stat-lbl">Packets</div></div>
            <div class="stat-card"><div class="stat-val" id="statSync">—</div><div class="stat-lbl">Sync Rate</div></div>
        </div>

        <!-- Overview Tab -->
        <div id="tab-overview">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><i class="fas fa-mobile-alt"></i> Active Devices</div>
                    <button class="btn btn-primary" onclick="loadOverview()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div id="devicesTable" class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>

        <!-- Users Tab -->
        <div id="tab-users" class="hidden">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><i class="fas fa-users"></i> User Accounts</div>
                    <button class="btn btn-primary" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div id="usersTable" class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>

        <!-- Devices Tab -->
        <div id="tab-devices" class="hidden">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><i class="fas fa-mobile-alt"></i> All Devices</div>
                    <button class="btn btn-primary" onclick="loadDevices()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div id="allDevicesTable" class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>

        <!-- Logs Tab -->
        <div id="tab-logs" class="hidden">
            <div class="card">
                <div class="card-head">
                    <div class="card-title"><i class="fas fa-list"></i> Audit Logs</div>
                    <button class="btn btn-primary" onclick="loadLogs()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
                <div id="logsTable" class="loading"><div class="spinner"></div> Loading...</div>
            </div>
        </div>
    </div>

    <script>
        // Auth check — only redirect once to avoid loops
        if (!sessionStorage.getItem('adminAuthChecked')) {
            sessionStorage.setItem('adminAuthChecked', '1');
            fetch('/api/admin/check').then(r => r.json()).then(d => {
                if (!d.admin) location.replace('/sys/core/panel/x7k2m/signin.html');
            }).catch(() => { location.replace('/sys/core/panel/x7k2m/signin.html'); });
        }

        // Tab switching
        document.querySelectorAll('.topbar-nav a[data-tab]').forEach(a => {
            a.addEventListener('click', e => {
                e.preventDefault();
                const tab = a.dataset.tab;
                document.querySelectorAll('.topbar-nav a[data-tab]').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('[id^="tab-"]').forEach(x => x.classList.add('hidden'));
                a.classList.add('active');
                document.getElementById('tab-' + tab).classList.remove('hidden');
                if (tab === 'overview') loadOverview();
                if (tab === 'users') loadUsers();
                if (tab === 'devices') loadDevices();
                if (tab === 'logs') loadLogs();
            });
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await fetch('/api/admin/logout', { method: 'POST' }).catch(() => {});
            location.href = '/sys/core/panel/x7k2m/signin.html';
        });

        function emptyState(msg) {
            return `<div class="empty"><i class="fas fa-inbox"></i>${msg}</div>`;
        }

        async function loadOverview() {
            const el = document.getElementById('devicesTable');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
            try {
                const [statsRes, devRes] = await Promise.all([
                    fetch('/api/admin/stats'),
                    fetch('/api/admin/system/sync')
                ]);
                const stats = await statsRes.json();
                const sync  = await devRes.json();
                document.getElementById('statUsers').textContent   = stats.totalUsers   ?? '—';
                document.getElementById('statDevices').textContent = stats.totalDevices ?? '—';
                document.getElementById('statPackets').textContent = stats.totalPackets ?? '—';
                document.getElementById('statSync').textContent    = stats.syncRate ? stats.syncRate + '%' : '—';
                const devices = stats.devices || [];
                if (!devices.length) { el.innerHTML = emptyState('No devices found'); return; }
                el.innerHTML = `<div class="tbl-wrap"><table>
                    <thead><tr><th>Device ID</th><th>User</th><th>Status</th><th>Last Seen</th></tr></thead>
                    <tbody>${devices.map(d => `<tr>
                        <td><code style="font-family:'JetBrains Mono',monospace;font-size:0.8rem">${d.device_id||'—'}</code></td>
                        <td>${d.parent_email||'—'}</td>
                        <td>${d.status==='online'?'<span class="badge badge-success">Online</span>':'<span class="badge badge-warning">Offline</span>'}</td>
                        <td>${d.last_seen ? new Date(d.last_seen).toLocaleString() : '—'}</td>
                    </tr>`).join('')}</tbody></table></div>`;
            } catch { el.innerHTML = emptyState('Failed to load data'); }
        }

        async function loadUsers() {
            const el = document.getElementById('usersTable');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
            try {
                const res = await fetch('/api/admin/system/users');
                const data = await res.json();
                const users = data.users || data || [];
                if (!users.length) { el.innerHTML = emptyState('No users found'); return; }
                el.innerHTML = `<div class="tbl-wrap"><table>
                    <thead><tr><th>Email</th><th>Status</th><th>License</th><th>Created</th></tr></thead>
                    <tbody>${users.map(u => `<tr>
                        <td>${u.parent_email||u.email||'—'}</td>
                        <td>${u.status==='active'?'<span class="badge badge-success">Active</span>':'<span class="badge badge-danger">Inactive</span>'}</td>
                        <td><code style="font-family:'JetBrains Mono',monospace;font-size:0.78rem">${u.license_key||'—'}</code></td>
                        <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</td>
                    </tr>`).join('')}</tbody></table></div>`;
            } catch { el.innerHTML = emptyState('Failed to load users'); }
        }

        async function loadDevices() {
            const el = document.getElementById('allDevicesTable');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
            try {
                const res = await fetch('/api/admin/system/sync');
                const data = await res.json();
                const devices = data.devices || data || [];
                if (!devices.length) { el.innerHTML = emptyState('No devices found'); return; }
                el.innerHTML = `<div class="tbl-wrap"><table>
                    <thead><tr><th>Device ID</th><th>User</th><th>Last Seen</th><th>Packets</th></tr></thead>
                    <tbody>${devices.map(d => `<tr>
                        <td><code style="font-family:'JetBrains Mono',monospace;font-size:0.8rem">${d.device_id||'—'}</code></td>
                        <td>${d.parent_email||'—'}</td>
                        <td>${d.last_seen ? new Date(d.last_seen).toLocaleString() : '—'}</td>
                        <td>${d.packet_count||'—'}</td>
                    </tr>`).join('')}</tbody></table></div>`;
            } catch { el.innerHTML = emptyState('Failed to load devices'); }
        }

        async function loadLogs() {
            const el = document.getElementById('logsTable');
            el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
            try {
                const res = await fetch('/api/admin/audit');
                const data = await res.json();
                const logs = data.logs || data || [];
                if (!logs.length) { el.innerHTML = emptyState('No logs found'); return; }
                el.innerHTML = `<div class="tbl-wrap"><table>
                    <thead><tr><th>Time</th><th>Admin</th><th>Action</th><th>Details</th></tr></thead>
                    <tbody>${logs.map(l => `<tr>
                        <td>${l.created_at ? new Date(l.created_at).toLocaleString() : '—'}</td>
                        <td>${l.admin_id||'—'}</td>
                        <td><span class="badge badge-info">${l.action||'—'}</span></td>
                        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.details||'—'}</td>
                    </tr>`).join('')}</tbody></table></div>`;
            } catch { el.innerHTML = emptyState('Failed to load logs'); }
        }

        // Initial load
        loadOverview();
    </script>
</body>
</html>

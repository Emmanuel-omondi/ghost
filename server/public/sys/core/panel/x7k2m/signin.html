<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Admin Login — GhostMonitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f; --surface: #111118; --border: rgba(255,255,255,0.07);
            --accent: #7c5cfc; --accent-glow: rgba(124,92,252,0.35); --accent-soft: rgba(124,92,252,0.12);
            --text: #f0eeff; --muted: #6b6880;
            --danger-soft: rgba(255,77,109,0.12); --danger-border: rgba(255,77,109,0.3);
            --input-bg: rgba(255,255,255,0.04); --input-border: rgba(255,255,255,0.1);
        }
        html { width:100%; max-width:100vw; overflow-x:hidden; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 85% 10%, rgba(124,92,252,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 90%, rgba(80,50,180,0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }
        .page {
            position: relative; z-index: 1;
            width: 100%; max-width: 420px; padding: 1.5rem;
            animation: rise 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes rise { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
        .brand { display:flex; align-items:center; gap:0.75rem; margin-bottom:2.25rem; }
        .brand-icon {
            width:44px; height:44px; background:var(--accent); border-radius:12px;
            display:flex; align-items:center; justify-content:center; font-size:1.25rem;
            box-shadow:0 0 24px var(--accent-glow); flex-shrink:0;
        }
        .brand-text h1 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:700; letter-spacing:-0.02em; line-height:1.2; }
        .brand-text small { display:block; font-size:0.68rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-top:2px; }
        .badge-admin {
            display:inline-block; background:var(--danger-soft); border:1px solid var(--danger-border);
            color:#ff8099; font-size:0.6rem; font-weight:700; letter-spacing:0.09em; text-transform:uppercase;
            padding:0.17rem 0.45rem; border-radius:4px; margin-left:0.4rem; vertical-align:middle;
        }
        .card {
            background:var(--surface); border:1px solid var(--border); border-radius:20px;
            padding:2.25rem; box-shadow:0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
        }
        .card h2 { font-family:'Syne',sans-serif; font-size:1.55rem; font-weight:700; letter-spacing:-0.03em; margin-bottom:0.35rem; }
        .card-sub { color:var(--muted); font-size:0.875rem; margin-bottom:1.75rem; }
        .error-msg {
            background:var(--danger-soft); border:1px solid var(--danger-border); color:#ff8099;
            font-size:0.85rem; padding:0.75rem 1rem; border-radius:10px; margin-bottom:1.25rem;
            display:none; align-items:center; gap:0.5rem;
        }
        .error-msg.show { display:flex; }
        .field { margin-bottom:1.2rem; }
        .field label { display:block; font-size:0.76rem; font-weight:500; color:var(--muted); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:0.5rem; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.875rem; pointer-events:none; z-index:1; }
        .input-wrap input {
            width:100%; padding:0.875rem 1rem 0.875rem 2.75rem;
            background:var(--input-bg); border:1px solid var(--input-border); border-radius:12px;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:1rem; outline:none;
            appearance:none; transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;
        }
        .input-wrap input::placeholder { color:var(--muted); }
        .input-wrap input:focus { border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 3px var(--accent-glow); }
        .btn-submit {
            width:100%; margin-top:0.5rem; padding:0.9rem;
            background:var(--accent); color:#fff; border:none; border-radius:12px;
            font-family:'Syne',sans-serif; font-size:1rem; font-weight:600; letter-spacing:0.02em;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.5rem;
            appearance:none; transition:transform 0.15s,box-shadow 0.15s,filter 0.15s;
            box-shadow:0 4px 20px var(--accent-glow);
        }
        .btn-submit:hover { transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 8px 30px var(--accent-glow); }
        .btn-submit:active { transform:translateY(0); }
        .btn-submit .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
        .btn-submit.loading .label { display:none; }
        .btn-submit.loading .spinner { display:inline-block; }
        @keyframes spin { to{transform:rotate(360deg)} }
        .divider { border:none; border-top:1px solid var(--border); margin:1.75rem 0 1.25rem; }
        .back-link { display:flex; align-items:center; justify-content:center; gap:0.4rem; font-size:0.83rem; color:var(--muted); text-decoration:none; transition:color 0.2s; }
        .back-link:hover { color:var(--accent); }
        @media(max-width:480px) { .page{padding:1rem} .card{padding:1.6rem 1.4rem} .brand{margin-bottom:1.75rem} .card h2{font-size:1.3rem} }
    </style>
</head>
<body>
    <div class="page">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-ghost"></i></div>
            <div class="brand-text">
                <h1>GhostMonitor <span class="badge-admin">Admin</span></h1>
                <small>Restricted access</small>
            </div>
        </div>
        <div class="card">
            <h2>Administrator login</h2>
            <p class="card-sub">Enter your credentials to access the admin panel</p>
            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials. Access denied.</span>
            </div>
            <form id="adminLoginForm" novalidate>
                <div class="field">
                    <label>Admin email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="adminEmail" placeholder="admin@example.com" required autofocus>
                    </div>
                </div>
                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="adminPass" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="label"><i class="fas fa-shield-alt"></i> Authenticate</span>
                    <span class="spinner"></span>
                </button>
            </form>
            <hr class="divider">
            <a href="/" class="back-link">
                <i class="fas fa-home"></i> Back to home
            </a>
        </div>
    </div>
    <script>
        const form = document.getElementById('adminLoginForm');
        const btn  = document.getElementById('submitBtn');
        const err  = document.getElementById('errorMsg');
        const errTxt = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.remove('show');
            btn.classList.add('loading');
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('adminEmail').value,
                        password: document.getElementById('adminPass').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    location.href = '/sys/core/panel/x7k2m/dashboard.html';
                } else {
                    errTxt.textContent = data.message || 'Invalid credentials. Access denied.';
                    err.classList.add('show');
                    btn.classList.remove('loading');
                }
            } catch {
                errTxt.textContent = 'Connection error. Try again.';
                err.classList.add('show');
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
